<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI简历优化器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.6;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:20px 16px 40px}
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 16px;border-bottom:1px solid #e5e5ea;margin-bottom:16px}
.nav-bar a{font-size:13px;color:#0071e3;text-decoration:none}
.nav-bar .brand{font-weight:700;font-size:15px}
.header{text-align:center;padding:20px 0 8px}
.header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.header .subtitle{font-size:13px;color:#86868b}
.usage-bar{background:#fff;border:1px solid #e5e5ea;border-radius:10px;padding:12px 14px;margin-top:16px;display:flex;align-items:center;justify-content:space-between}
.usage-bar .remaining{font-size:13px}
.usage-bar .remaining span{font-weight:700;color:#0071e3}
.usage-bar .dots{display:flex;gap:4px}
.usage-bar .dot{width:8px;height:8px;border-radius:50%;background:#e5e5ea}
.usage-bar .dot.used{background:#34c759}
.input-section{margin-top:16px}
.input-label{font-size:14px;font-weight:600;margin-bottom:8px}
textarea{width:100%;min-height:220px;border:1.5px solid #d2d2d7;border-radius:12px;padding:14px;font-size:15px;font-family:inherit;line-height:1.8;resize:vertical;background:#fff;outline:none}
textarea:focus{border-color:#34c759}
textarea::placeholder{color:#aeaeb2}
.char-count{text-align:right;font-size:12px;color:#aeaeb2;margin-top:4px}
.btn-section{margin-top:20px}
.btn-generate{width:100%;padding:14px;font-size:16px;font-weight:600;border:none;border-radius:12px;background:#34c759;color:#fff;cursor:pointer}
.btn-generate:active{transform:scale(.98)}
.btn-generate:disabled{background:#a8d8b5;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-generate.loading .spinner{display:block}
.btn-generate.loading span{display:none}
.result-section{margin-top:24px;display:none}
.result-section.visible{display:block}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.result-header .label{font-size:14px;font-weight:600}
.btn-copy{padding:6px 14px;font-size:13px;font-weight:500;border:1px solid #34c759;border-radius:8px;background:#fff;color:#34c759;cursor:pointer}
.btn-copy.copied{background:#34c759;color:#fff;border-color:#34c759}
.result-content{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:20px;font-size:14px;line-height:1.9;white-space:pre-wrap;word-break:break-word}
.upgrade-prompt{display:none;margin-top:20px}
.upgrade-prompt.visible{display:block}
.upgrade-card{background:linear-gradient(135deg,#34c759,#30b350);border-radius:14px;padding:24px 20px;text-align:center;color:#fff}
.upgrade-card h3{font-size:18px;margin-bottom:6px}
.upgrade-card p{font-size:13px;opacity:.9;margin-bottom:16px}
.upgrade-features{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.upgrade-feature{background:rgba(255,255,255,.15);border-radius:8px;padding:8px 12px;font-size:12px}
.btn-upgrade{display:inline-block;padding:12px 32px;font-size:15px;font-weight:600;background:#fff;color:#30b350;border-radius:10px;text-decoration:none}
.error-msg{background:#fff2f0;border:1px solid #ffccc7;border-radius:10px;padding:12px 16px;font-size:14px;color:#cf1322;margin-top:16px;display:none}
.error-msg.visible{display:block}
.footer{text-align:center;padding:32px 0 20px;font-size:12px;color:#aeaeb2}
</style>


<script>
// API routing: GitHub Pages needs backend proxy (CORS blocks direct DashScope calls)
// So we detect environment and show appropriate message
(function() {
  var isGH = location.hostname.includes('github.io');
  window.API_BASE = isGH ? '' : '';
  window.IS_GH = isGH;
  
  if (isGH) {
    // On GitHub Pages, API calls won't work due to CORS
    // Override fetch to show helpful error
    var origFetch = window.fetch;
    window.fetch = function(url, options) {
      if (typeof url === 'string' && url.startsWith('/api/')) {
        return Promise.reject(new Error('GitHub Pages不支持API调用，请使用本地版'));
      }
      return origFetch.apply(this, arguments);
    };
  }
})();
</script>


</head>
<body>

<div id="gh-notice" style="display:none;background:#fff3cd;color:#856404;text-align:center;padding:8px;font-size:12px">
  ⚠️ GitHub Pages不支持后端API，请使用本地版访问 <a href="http://localhost:3456" style="color:#0071e3">localhost:3456</a>
</div>
<script>
if (location.hostname.includes('github.io')) document.getElementById('gh-notice').style.display='block';
</script>

<div class="container">
  <nav class="nav-bar">
    <span class="brand">🤖 AI工作助手</span>
    <a href="/">← 返回首页</a>
  </nav>

  <div class="header">
    <h1>📄 AI简历优化器</h1>
    <div class="subtitle">大厂PM视角 + STAR法则，让简历脱颖而出</div>
  </div>

  <div class="usage-bar" id="usageBar">
    <div class="remaining">今日剩余：<span id="remainingCount">3</span> 次</div>
    <div class="dots" id="usageDots">
      <div class="dot free"></div><div class="dot free"></div><div class="dot free"></div>
    </div>
  </div>

  <div class="input-section">
    <div class="input-label">📋 粘贴你的原始简历</div>
    <textarea id="inputContent" placeholder="把你当前简历的文字内容粘贴到这里：&#10;&#10;张三&#10;联系方式：138xxxx&#10;&#10;工作经历：&#10;2022-至今 某某公司 产品经理&#10;• 负责用户增长模块&#10;• 参与了App改版项目&#10;&#10;教育背景：&#10;XX大学 计算机科学 本科&#10;&#10;不需要担心格式不好看，AI会帮你全面优化~"></textarea>
    <div class="char-count"><span id="charCount">0</span> 字</div>
  </div>

  <div class="btn-section">
    <button class="btn-generate" id="btnGenerate" onclick="generate()">
      <span class="spinner"></span><span>✨ 优化简历</span>
    </button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-section" id="resultSection">
    <div class="result-header">
      <span class="label">✨ 优化后的简历</span>
      <button class="btn-copy" id="btnCopy" onclick="copyResult()">📋 一键复制</button>
    </div>
    <div class="result-content" id="resultContent"></div>
  </div>

  <div class="upgrade-prompt" id="upgradePrompt">
    <div class="upgrade-card">
      <h3>🚀 免费额度已用完</h3>
      <p>升级会员，解锁无限次数 + 全部AI工具</p>
      <div class="upgrade-features">
        <span class="upgrade-feature">✅ 不限次数</span>
        <span class="upgrade-feature">📝 周报生成</span>
        <span class="upgrade-feature">🎙️ 会议纪要</span>
        <span class="upgrade-feature">📄 简历优化</span>
      </div>
      <a href="https://afdian.com" target="_blank" class="btn-upgrade">
        ¥9.9/月 立即订阅
      </a>
    </div>
  </div>

  <div class="footer">AI 生成内容仅供参考 · 数据仅用于生成，不会存储</div>
</div>

<script>
var FREE_LIMIT=3;
var usedCount=parseInt(localStorage.getItem('resume_used')||'0');
var today=new Date().toDateString();
if(localStorage.getItem('resume_date')!==today){usedCount=0;localStorage.setItem('resume_date',today)}
updateUI();
function updateUI(){var r=Math.max(0,FREE_LIMIT-usedCount);document.getElementById('remainingCount').textContent=r;document.querySelectorAll('#usageDots .dot').forEach(function(d,i){d.className='dot '+(i<usedCount?'used':'free')});if(usedCount>=FREE_LIMIT){document.getElementById('btnGenerate').disabled=true;document.getElementById('upgradePrompt').classList.add('visible')}}
document.getElementById('inputContent').addEventListener('input',function(){document.getElementById('charCount').textContent=this.value.length});

async function generate(){
var c=document.getElementById('inputContent').value.trim(),btn=document.getElementById('btnGenerate'),err=document.getElementById('errorMsg');
if(!c){showError('请粘贴你的简历内容~');return}
if(c.length<30){showError('内容太短啦，完整的简历优化效果更好~');return}
if(usedCount>=FREE_LIMIT)return;
err.classList.remove('visible');btn.classList.add('loading');btn.disabled=true;
try{
var r=await fetch('/api/resume',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:c})});
var d=await r.json();
if(d.error){showError(d.error);btn.classList.remove('loading');btn.disabled=false;return}
document.getElementById('resultContent').textContent=d.result;
document.getElementById('resultSection').classList.add('visible');
document.getElementById('btnCopy').classList.remove('copied');document.getElementById('btnCopy').textContent='📋 一键复制';
usedCount++;localStorage.setItem('resume_used',usedCount);updateUI();
document.getElementById('resultSection').scrollIntoView({behavior:'smooth',block:'center'});
}catch(e){showError('网络异常')}
btn.classList.remove('loading');if(usedCount<FREE_LIMIT)btn.disabled=false;
}

function copyResult(){
var t=document.getElementById('resultContent').textContent,b=document.getElementById('btnCopy');
if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){b.classList.add('copied');b.textContent='✅ 已复制';setTimeout(function(){b.classList.remove('copied');b.textContent='📋 一键复制'},2000)})}
else{var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);b.classList.add('copied');b.textContent='✅ 已复制';setTimeout(function(){b.classList.remove('copied');b.textContent='📋 一键复制'},2000)}
}

function showError(m){var e=document.getElementById('errorMsg');e.textContent=m;e.classList.add('visible');setTimeout(function(){e.classList.remove('visible')},4000)}
</script>
</body>
</html>
