<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI翻译润色</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.6;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:20px 16px 40px}
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 16px;border-bottom:1px solid #e5e5ea;margin-bottom:16px}
.nav-bar a{font-size:13px;color:#0071e3;text-decoration:none}
.nav-bar .brand{font-weight:700;font-size:15px}
.header{text-align:center;padding:20px 0 8px}
.header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.header .subtitle{font-size:13px;color:#86868b}
.usage-bar{background:#fff;border:1px solid #e5e5ea;border-radius:10px;padding:12px 14px;margin-top:16px;display:flex;align-items:center;justify-content:space-between}
.usage-bar .remaining{font-size:13px}
.usage-bar .remaining span{font-weight:700;color:#ff6b35}
.lang-tabs{display:flex;gap:6px;margin:16px 0}
.lang-tab{padding:8px 16px;font-size:13px;border:1.5px solid #d2d2d7;border-radius:8px;background:#fff;cursor:pointer;font-weight:500}
.lang-tab.active{border-color:#ff6b35;background:#fff5f0;color:#ff6b35}
textarea{width:100%;min-height:160px;border:1.5px solid #d2d2d7;border-radius:12px;padding:14px;font-size:15px;font-family:inherit;line-height:1.8;resize:vertical;background:#fff;outline:none}
textarea:focus{border-color:#ff6b35}
textarea::placeholder{color:#aeaeb2}
.char-count{text-align:right;font-size:12px;color:#aeaeb2;margin-top:4px}
.btn-generate{width:100%;padding:14px;font-size:16px;font-weight:600;border:none;border-radius:12px;background:#ff6b35;color:#fff;cursor:pointer;margin-top:16px}
.btn-generate:active{transform:scale(.98)}
.btn-generate:disabled{background:#f5b89b;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-generate.loading .spinner{display:block}
.btn-generate.loading span{display:none}
.result-section{margin-top:24px;display:none}
.result-section.visible{display:block}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.btn-copy{padding:6px 14px;font-size:13px;font-weight:500;border:1px solid #ff6b35;border-radius:8px;background:#fff;color:#ff6b35;cursor:pointer}
.btn-copy.copied{background:#34c759;color:#fff;border-color:#34c759}
.result-content{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:20px;font-size:14px;line-height:1.9;white-space:pre-wrap;word-break:break-word}
.error-msg{background:#fff2f0;border:1px solid #ffccc7;border-radius:10px;padding:12px 16px;font-size:14px;color:#cf1322;margin-top:16px;display:none}
.error-msg.visible{display:block}
.footer{text-align:center;padding:32px 0 20px;font-size:12px;color:#aeaeb2}
</style>

<script>
// Auto-detect environment and route API calls
(function() {
  var isGH = location.hostname.includes('github.io');
  var isLocal = location.hostname.includes('localhost');
  
  window.API_BASE = isLocal ? '' : (isGH ? '' : '');
  window.DASHSCOPE_KEY = 'sk-20e1483f727e40bc9785217be99986f7';
  
  // Override fetch for API calls to route correctly
  var origFetch = window.fetch;
  window.fetch = function(url, options) {
    if (typeof url === 'string' && url.startsWith('/api/')) {
      if (isGH) {
        // On GitHub Pages, call DashScope directly
        var body = JSON.parse(options.body);
        return callDashScope(url, body);
      }
      // Local/Vercel: use the backend API
      return origFetch(url, options);
    }
    return origFetch.apply(this, arguments);
  };

  async function callDashScope(apiPath, body) {
    var model = 'qwen-plus';
    var systemPrompt = '';
    var userContent = body.content || '';
    
    if (apiPath === '/api/generate') {
      var styles = {
        professional: '你是职场汇报专家。将工作要点整理成专业周报。格式：标题+重点项目进展+日常工作推进+下周计划+本周感悟。直接输出周报。',
        result: '你是成果导向型汇报专家。整理周报突出量化成果。直接输出。',
        concise: '你是高效汇报专家。整理成极简周报，不超过5条。直接输出。',
        tech: '你是技术团队周报助手。整理成技术风周报。直接输出。'
      };
      systemPrompt = styles[body.style] || styles.professional;
    } else if (apiPath === '/api/minutes') {
      systemPrompt = '你是会议纪要专家。整理会议记录：议题+讨论要点+决议+待办事项。直接输出。';
    } else if (apiPath === '/api/resume') {
      systemPrompt = '你是简历优化专家。STAR法则重写，突出量化成果。直接输出。';
    } else if (apiPath === '/api/translate') {
      systemPrompt = body.mode === 'zh2en' ? '中译英专家。翻译成地道英文。只输出译文。' : '英译中专家。翻译成流畅中文。只输出译文。';
    } else if (apiPath === '/api/analyze') {
      systemPrompt = '你是数据分析师。输出：数据概览+关键发现+趋势+异常+建议。直接输出。';
    }
    
    var resp = await origFetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + window.DASHSCOPE_KEY
      },
      body: JSON.stringify({
        model: model,
        messages: [{role:'system',content:systemPrompt},{role:'user',content:userContent}],
        temperature: 0.7,
        max_tokens: 2000
      })
    });
    var data = await resp.json();
    return {
      json: function() { return Promise.resolve({ result: data.choices[0].message.content }); }
    };
  }
})();
</script>

</head>
<body>
<div class="container">
  <nav class="nav-bar"><span class="brand">🤖 AI工作助手</span><a href="/">← 返回首页</a></nav>
  <div class="header"><h1>🌐 AI翻译润色</h1><div class="subtitle">中英互译 + 专业润色，不只是翻译</div></div>
  
  <div class="lang-tabs" id="langTabs">
    <div class="lang-tab active" data-mode="zh2en">中文 → 英文</div>
    <div class="lang-tab" data-mode="en2zh">英文 → 中文</div>
  </div>
  
  <div class="input-section">
    <textarea id="inputContent" placeholder="输入需要翻译的内容...&#10;&#10;中文自动翻译成地道英文&#10;英文自动翻译成流畅中文&#10;&#10;不只是翻译，还会帮你润色语言~"></textarea>
    <div class="char-count"><span id="charCount">0</span> 字</div>
  </div>
  
  <button class="btn-generate" id="btnGenerate" onclick="generate()">
    <span class="spinner"></span><span>✨ 翻译润色</span>
  </button>
  
  <div class="error-msg" id="errorMsg"></div>
  
  <div class="result-section" id="resultSection">
    <div class="result-header">
      <span class="label" style="font-size:14px;font-weight:600">🌐 翻译结果</span>
      <button class="btn-copy" id="btnCopy" onclick="copyResult()">📋 一键复制</button>
    </div>
    <div class="result-content" id="resultContent"></div>
  </div>
  
  <div class="footer">AI 翻译仅供参考，重要文件请人工校对</div>
</div>

<script>
var mode='zh2en';
document.getElementById('langTabs').addEventListener('click',function(e){
  var t=e.target.closest('.lang-tab');if(!t)return;
  document.querySelectorAll('.lang-tab').forEach(function(c){c.classList.remove('active')});
  t.classList.add('active');mode=t.dataset.mode;
});
document.getElementById('inputContent').addEventListener('input',function(){document.getElementById('charCount').textContent=this.value.length});

async function generate(){
var c=document.getElementById('inputContent').value.trim(),btn=document.getElementById('btnGenerate');
if(!c){showError('请输入内容~');return}
btn.classList.add('loading');btn.disabled=true;
try{
var r=await fetch('/api/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:c,mode:mode})});
var d=await r.json();
if(d.error){showError(d.error)}else{
document.getElementById('resultContent').textContent=d.result;
document.getElementById('resultSection').classList.add('visible');
document.getElementById('btnCopy').classList.remove('copied');document.getElementById('btnCopy').textContent='📋 一键复制';
document.getElementById('resultSection').scrollIntoView({behavior:'smooth',block:'center'});
}
}catch(e){showError('网络异常')}
btn.classList.remove('loading');btn.disabled=false;
}

function copyResult(){
var t=document.getElementById('resultContent').textContent,b=document.getElementById('btnCopy');
if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){b.classList.add('copied');b.textContent='✅ 已复制';setTimeout(function(){b.classList.remove('copied');b.textContent='📋 一键复制'},2000)})}
else{var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);b.classList.add('copied');b.textContent='✅ 已复制';setTimeout(function(){b.classList.remove('copied');b.textContent='📋 一键复制'},2000)}
}
function showError(m){var e=document.getElementById('errorMsg');e.textContent=m;e.classList.add('visible');setTimeout(function(){e.classList.remove('visible')},4000)}
</script>
</body>
</html>
